name: dar_el_3loom
description: "Dar El 3loom mobile application for providing educational and service features."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI & Design
  google_fonts: ^6.3.2
  flutter_svg: ^2.2.2
  carousel_slider: ^5.1.1
  curved_navigation_bar: ^1.0.6
  introduction_screen: ^4.0.0

  # State Management
  provider: ^6.1.5+1

  # Networking
  dio: ^5.9.1

  # Local Storage
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.20.2
  fluttertoast: ^9.0.0
  connectivity_plus: ^7.0.0
  image_picker: ^1.2.1
  image_gallery_saver_plus: ^4.0.1

  # Config & Logging (IMPORTANT)
  flutter_dotenv: ^5.1.0
  logger: ^2.0.2

  # Splash & Icons
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

  # Optional (keep only if you REALLY use realtime features)
  socket_io_client: ^3.1.4
  dotted_line: ^3.2.3
  flutter_inner_shadow: ^0.0.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/application.png"
  adaptive_icon_foreground: "assets/images/application.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Hive generator (if you use TypeAdapters)
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
